<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contacto - Piazza Delizioso</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <img src="logo.jpg" alt="Logo de la pizzería" class="logo">
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="MENU.html">Menú</a></li>
        <li><a href="PROMO.html">Promociones</a></li>
        <li><a href="CONTACTO.html">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <section>
    <h2 style="text-align:center;">Contáctanos</h2>
    <form>
      <input type="text" placeholder="Nombre" required>
      <input type="email" placeholder="Email" required>
      <input type="tel" placeholder="Teléfono">
      <textarea rows="4" placeholder="Mensaje"></textarea>
      <button type="submit">Enviar</button>
    </form>

    <div class="map">
      <h3>¿Dónde estamos?</h3>
      <iframe src="https://maps.google.com/maps?q=Roma,+Italia&t=&z=13&ie=UTF8&iwloc=&output=embed" width="90%" height="200" style="border:0;" allowfullscreen></iframe>
    </div>

    <section>
      <h3 style="text-align:center;">Horario de Atención</h3>
      <ul style="text-align:center; list-style: none;">
        <li>Lunes a Viernes: 12:00pm - 10:00pm</li>
        <li>Sábados: 1:00pm - 11:00pm</li>
        <li>Domingos: 1:00pm - 9:00pm</li>
      </ul>
    </section>
  </section>
</body>
</html>
